# 阿里云 Nginx 完整示例（复制到站点配置里用）
# 用法：把下面整个 server { } 保存为 /etc/nginx/conf.d/wheel.cryptooptiontool.conf
#       或合并进你现有的 server 块（把 location 和 root 等拷进去）
# 然后: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name wheel.cryptooptiontool.com;
    # 网站根目录改成你实际路径，例如：
    root /www/cryptooptiontool;
    index index.html;

    # ========== 先处理重定向，避免 URL 里出现 .html ==========
    location = /cn/index.html { return 301 https://$host/cn/; }
    location = /en/index.html { return 301 https://$host/en/; }
    location = /cn/about.html { return 301 https://$host/cn/about/; }
    location = /en/about.html { return 301 https://$host/en/about/; }
    location = /index.html { return 301 https://$host/; }
    location = /about.html { return 301 https://$host/cn/about/; }

    location = /cn { return 301 https://$host/cn/; }
    location = /en { return 301 https://$host/en/; }
    location = /cn/about { return 301 https://$host/cn/about/; }
    location = /en/about { return 301 https://$host/en/about/; }

    # ========== 静态文件：优先目录再 index，不要用 $uri.html ==========
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# 若已用 HTTPS，在 443 的 server 里同样加上上面那些 location 和 try_files
# 若只用 HTTP，把 return 301 里的 https 改成 http
